<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="./assets/book-open.svg" />
    <title>LearnHub</title>
  </head>
  <body>
    <nav class="navbar">
      <a href="./index.html" class="nav-title">
        <img
          class="nav-img"
          src="./assets/book-open.svg"
          alt="book-icon"
        />LearnHub</a
      >

      <button class="hamburger" aria-label="Toggle menu">
        <img src="./assets/hamburger.svg" alt="hamburger-icon" />
      </button>

      <ul class="nav-sidebar">
        <li class="sidebar">
          <a class="sidebar-link" href="./index.html"
            ><img
              src="./assets/home.svg"
              class="sidebar-img"
              alt="home-icon"
            />Home</a
          >
        </li>
        <li class="sidebar">
          <a class="sidebar-link" id="savedPage" href="./saved.html">
            <img
              src="./assets/bookmark.svg"
              class="sidebar-img"
              alt="save-icon"
            />Saved Videos</a
          >
        </li>
      </ul>
    </nav>
    <main>
      <h2>Welcome Back, Havva!</h2>
      <div class="search-bar">
        <form id="search-form">
          <label for="user-input" class="visually-hidden"
            >Search for videos</label
          >
          <input
            type="text"
            id="user-input"
            placeholder="What do you want to learn today?"
          />
          <button id="search-btn" aria-label="Search videos">
            <img src="./assets/search.svg" alt="" />
          </button>
        </form>
      </div>
      <div id="content-container"></div>
      <p id="error" class="hidden error"></p>
      <button id="loadMore" class="hidden">Load More</button>
    </main>
    <script src="secret.js"></script>
    <script src="script.js"></script>
  </body>
</html>
